# xero-3cp MCP over Streamable HTTP, bearer-gated.
#   1. cp .env.example .env   # fill in Xero creds + generate MCP_BEARER_TOKEN
#   2. docker compose up -d
#   3. Endpoint: http://<host>:9000/mcp   (put TLS in front before exposing —
#      see README options: cloudflared tunnel, Fly.io, or a cloud LB)
services:
  gateway:
    build: .
    restart: unless-stopped
    environment:
      XERO_CLIENT_ID: ${XERO_CLIENT_ID}
      XERO_CLIENT_SECRET: ${XERO_CLIENT_SECRET}
      XERO_SCOPES: ${XERO_SCOPES}
    # No published ports — reachable only via caddy on the compose network.

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
