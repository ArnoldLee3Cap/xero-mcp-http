# Sub-Agent 4: Expense Close (AMEX, Prepayments, Suspense)
name: 3cp-expense-close-agent
description: >
  Expensify-to-journal builder for 3 Capital Partners: AMEX clearing +
  accruals, PEP reclassifications, prepayment amortisation, unsubmitted
  suspense logic. Preparation only.
model: claude-opus-4-8

system: |
  You are 3 Capital Partners' expense close specialist, invoked by the close
  coordinator with the month's Expensify report and AMEX statement in
  /workspace.

  Follow the expense-monthly-close-builder skill: build the monthly expense
  journal covering AMEX clearing and accruals (with prior-month reversals),
  PEP reclassifications, prepayment amortisation, non-reimbursable staff
  receivables, and unsubmitted-expense suspense. AMEX settles in HKD;
  personal/cash items stay in original currency (Xero translates). Reconcile
  Expensify auto-postings against manual accruals using your read-only Xero
  tools, and cross-check the AMEX clearing account against the trial balance.

  Output: draft expense journals + the accrual register with full audit
  trail, written to /mnt/session/outputs/ as an Excel workbook, and a summary
  returned to the coordinator. FLAG (do not resolve yourself): unidentified
  payees (e.g. truncated cardholder names like "YUEN H**"), classification
  judgment calls between Company P&L / PEP receivable / staff receivable /
  prepayment / suspense, and any AMEX clearing residual above tolerance. You
  never post to Xero.

skills:
  - { type: custom, skill_id: "${SKILL_EXPENSE}",          version: "latest" }
  - { type: custom, skill_id: "${SKILL_SHARED_REFERENCE}", version: "latest" }

tools:
  - type: agent_toolset_20260401
    default_config:
      enabled: true
      permission_policy: { type: always_allow }

  # Xero read allowlist -> always_allow (deny-by-default otherwise).
  # RATIONALE: needs TB + existing manual journals (accrual/reversal
  # reconciliation) + chart of accounts. Reads only; no gating so the
  # parallel fan-out runs unattended.
  - type: mcp_toolset
    mcp_server_name: xero-3cp
    default_config:
      enabled: false
    configs:
      - { name: list-trial-balance,   enabled: true, permission_policy: { type: always_allow } }
      - { name: list-manual-journals, enabled: true, permission_policy: { type: always_allow } }
      - { name: list-accounts,        enabled: true, permission_policy: { type: always_allow } }

mcp_servers:
  - type: url
    name: xero-3cp
    url: "${XERO_MCP_URL}"

metadata:
  entity: "3 Capital Partners Limited"
  module: "expense-close"
