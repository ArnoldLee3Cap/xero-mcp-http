# ============================================================================
# 3CP Close Coordinator — TEMPLATE
# ----------------------------------------------------------------------------
# This file contains ${...} placeholders (sub-agent IDs/versions, skill IDs,
# MCP URL). Do NOT apply it directly with `ant beta:agents create < file` —
# setup.sh substitutes the placeholders and applies the rendered body.
# The five sub-agents must exist FIRST; their IDs go into the roster below.
# ============================================================================
name: 3cp-close-coordinator
description: >
  Routes 3 Capital Partners' month-end close. Mode 1 = document-intake audit;
  Mode 2 = parallel close execution across five module sub-agents, synthesized
  into a draft-journal workpaper and completeness report.
model: claude-opus-4-8

system: |
  You are the Month-End Close Coordinator for 3 Capital Partners Limited
  (SFC-licensed, Type 1/4/9, CE BHP587). You orchestrate the monthly close by
  delegating to specialist sub-agents and synthesizing their outputs. You never
  prepare module journals yourself — the module skills live on the sub-agents.

  ## Modes
  Accept exactly one of two instructions per run:

  **Mode 1 — Document intake audit.** The user has provided the month's source
  documents. Delegate to a copy of yourself (the `self` roster entry) with the
  instruction to run the 3cp-close-orchestrator skill's document-intake check
  against recurring-register.md, and report covered-vs-missing items. Do not
  start any close work in Mode 1.

  **Mode 2 — Close execution.** Delegate to ALL FIVE module sub-agents
  SIMULTANEOUSLY (payroll, treasury, revenue, expense, bank reconciliation) —
  spawn them in the same turn, not sequentially. Pass each one the location of
  its source documents in /workspace and any period parameters. While they
  run, read recurring-register.md from the 3cp-shared-reference skill — it is
  your completeness checklist.

  ## Synthesis (Mode 2)
  When all sub-agents return:
  1. Consolidate every draft journal into ONE Excel workpaper — one worksheet
     per module plus a summary tab — written to /mnt/session/outputs/.
  2. Produce a completeness report: every line of recurring-register.md marked
     PREPARED / MISSING / N/A-this-month, plus each sub-agent's flagged items.
     Write it to /mnt/session/outputs/ as well.

  ## Hard rules
  - Xero writes: you may create DRAFT entries only, via the
    3cp-xero-journal-poster contract (dedupe on unique reference; reconcile
    with read tools before posting). Every xero-3cp tool call you make pauses
    for explicit user confirmation at the infrastructure level — never attempt
    to work around a denied call; a denial means the user declined it.
  - Promotion of drafts to Posted is a HUMAN step, never yours.
  - HALT and go idle awaiting a user message whenever a sub-agent reports:
    unidentified payees, materiality judgment calls, or ambiguous
    reconciliations. List the open items precisely and ask for direction.
    After the user answers, re-delegate ONLY the affected module.
  - Report faithfully: if a module failed or a register item is missing, say
    so plainly in the completeness report. Never mark an item prepared without
    pointing to the journal line that covers it.

skills:
  # DECISION (deviation from spec noted): the build prompt said "Skills: none
  # directly", but the coordinator needs (a) the close-orchestrator for the
  # Mode 1 document audit + Mode 2 completeness semantics, (b) shared-reference
  # for recurring-register.md, and (c) the journal-poster contract for
  # draft-only, idempotent Xero writes. Without these it cannot fulfil the
  # synthesis and runbook steps the same prompt requires.
  - { type: custom, skill_id: "${SKILL_CLOSE_ORCHESTRATOR}", version: "latest" }
  - { type: custom, skill_id: "${SKILL_SHARED_REFERENCE}",   version: "latest" }
  - { type: custom, skill_id: "${SKILL_XERO_POSTER}",        version: "latest" }

tools:
  # --- Built-in toolset: file ops, bash, web search/fetch -> always_allow. ---
  # RATIONALE: these act only inside the sandboxed container (limited-egress
  # environment). Gating every file read would make the run un-drivable; the
  # blast radius of container-local actions is the session itself.
  - type: agent_toolset_20260401
    default_config:
      enabled: true
      permission_policy: { type: always_allow }

  # --- xero-3cp MCP tools: every enabled tool -> always_ask. ----------------
  # RATIONALE (conservative gate, per spec): Xero is the live ledger. Even
  # read tools are gated on the coordinator so the audit trail shows a human
  # confirmation for every ledger touch made at the orchestration level.
  # (Sub-agents get narrow read-only allowlists with always_allow instead —
  # see their YAMLs — so parallel prep isn't blocked on approvals.)
  #
  # NOTE on "read-only": the spec says coordinator = read-only, but its own
  # runbook has approved requires_action events posting draft journals. The
  # reconciliation implemented here: the three create-* tools needed for
  # DRAFT posting are enabled but always_ask — nothing writes without an
  # explicit per-call user approval. To make the coordinator strictly
  # read-only instead, delete the three create-* lines below and run posting
  # as a separate manual session.
  - type: mcp_toolset
    mcp_server_name: xero-3cp
    default_config:
      enabled: false                       # deny-by-default: any tool not
                                           # listed below (incl. create-contact,
                                           # create-repeating-invoice,
                                           # create-attachment) is unavailable.
    configs:
      # Read tools — needed for completeness check + reconcile-before-post.
      - { name: list-accounts,                     enabled: true, permission_policy: { type: always_ask } }
      - { name: list-trial-balance,                enabled: true, permission_policy: { type: always_ask } }
      - { name: list-manual-journals,              enabled: true, permission_policy: { type: always_ask } }
      - { name: list-invoices,                     enabled: true, permission_policy: { type: always_ask } }
      - { name: list-bank-transactions,            enabled: true, permission_policy: { type: always_ask } }
      - { name: list-contacts,                     enabled: true, permission_policy: { type: always_ask } }
      - { name: list-aged-receivables-by-contact,  enabled: true, permission_policy: { type: always_ask } }
      - { name: list-organisation-details,         enabled: true, permission_policy: { type: always_ask } }
      # Write tools — DRAFT creation only, per 3cp-xero-journal-poster contract.
      # Each call pauses the session (requires_action) until the user sends
      # user.tool_confirmation allow/deny. See docs/session-event-handling.md.
      - { name: create-manual-journal,             enabled: true, permission_policy: { type: always_ask } }
      - { name: create-invoice,                    enabled: true, permission_policy: { type: always_ask } }
      - { name: create-bank-transaction,           enabled: true, permission_policy: { type: always_ask } }

mcp_servers:
  # No auth here — the Xero credential lives in a vault attached per-session
  # via vault_ids (see setup.sh). Credentials are matched to this URL and
  # injected at Anthropic's egress proxy; they never enter the container.
  - type: url
    name: xero-3cp
    url: "${XERO_MCP_URL}"

multiagent:
  type: coordinator
  agents:
    # Version-pinned roster (reproducibility). setup.sh injects the versions
    # captured at sub-agent creation. Updating a sub-agent later requires
    # bumping the pin here -> new coordinator version (docs/versioning.md).
    - { type: agent, id: "${PAYROLL_AGENT_ID}",  version: ${PAYROLL_AGENT_VER} }
    - { type: agent, id: "${TREASURY_AGENT_ID}", version: ${TREASURY_AGENT_VER} }
    - { type: agent, id: "${REVENUE_AGENT_ID}",  version: ${REVENUE_AGENT_VER} }
    - { type: agent, id: "${EXPENSE_AGENT_ID}",  version: ${EXPENSE_AGENT_VER} }
    - { type: agent, id: "${RECON_AGENT_ID}",    version: ${RECON_AGENT_VER} }
    # Mode 1 document-audit worker: the spec names a doc-audit sub-agent but
    # defines none; a self-copy (inherits the close-orchestrator skill) fills
    # that role without a seventh agent object.
    - { type: self }

metadata:
  entity: "3 Capital Partners Limited"
  workflow: "month-end-close"
  owner: "arnold.lee@3capitalpartners.com"
